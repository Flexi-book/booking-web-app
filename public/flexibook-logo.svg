  <!-- 3  --> <line x1="168"   y1="130"   x2="156"   y2="130"   stroke="url(#g)" stroke-width="6"   stroke-linecap="round"/>
  <!-- 4  --> <line x1="158.5" y1="166"   x2="151"   y2="161.5" stroke="url(#g)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- 5  --> <line x1="132"   y1="192.5" x2="126.8" y2="181.5" stroke="url(#g)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- 6  --> <line x1="96"    y1="202"   x2="96"    y2="190"   stroke="url(#g)" stroke-width="6"   stroke-linecap="round"/>
  <!-- 7  --> <line x1="60"    y1="192.5" x2="65.2"  y2="181.5" stroke="url(#g)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- 8  --> <line x1="33.5"  y1="166"   x2="41"    y2="161.5" stroke="url(#g)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- 9  --> <line x1="24"    y1="130"   x2="36"    y2="130"   stroke="url(#g)" stroke-width="6"   stroke-linecap="round"/>
