<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="120" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a3a8f"/>
      <stop offset="50%" stop-color="#0674f6"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="120" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a3a8f"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Clock body -->
  <circle cx="55" cy="65" r="42" stroke="url(#grad)" stroke-width="7" fill="none"/>

  <!-- Clock tick marks -->
  <line x1="55" y1="28" x2="55" y2="34" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="55" y1="96" x2="55" y2="102" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="13" y1="65" x2="19" y2="65" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="91" y1="65" x2="97" y2="65" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Crown / top of stopwatch -->
  <rect x="48" y="18" width="14" height="7" rx="3.5" fill="url(#grad)"/>
  <rect x="54" y="10" width="8" height="10" rx="4" fill="url(#grad)"/>

  <!-- Checkmark inside clock -->
  <polyline points="37,65 50,78 73,52" stroke="url(#grad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Swoosh / F curve extending top-right -->
  <path d="M72 30 C80 18, 100 14, 110 22 C118 28, 115 40, 105 42"
        stroke="url(#grad2)" stroke-width="6.5" stroke-linecap="round" fill="none"/>
  <circle cx="105" cy="43" r="5" fill="url(#grad2)"/>
</svg>
