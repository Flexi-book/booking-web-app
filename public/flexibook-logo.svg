<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <defs>
    <linearGradient id="g" x1="10" y1="220" x2="190" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2d1b69"/>
      <stop offset="45%"  stop-color="#1a50d9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Soporte de corona -->
  <rect x="84" y="54" width="16" height="9" rx="4.5" fill="url(#g)"/>
  <!-- Botón corona -->
  <rect x="88" y="41" width="9" height="15" rx="4.5" fill="url(#g)"/>

  <!-- Círculo del reloj -->
  <circle cx="96" cy="130" r="72" stroke="url(#g)" stroke-width="9" fill="none"/>

